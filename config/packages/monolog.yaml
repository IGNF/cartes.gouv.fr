monolog:
    channels:
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel when it exists

when@dev:
    monolog:
        channels:
            - mailer

        handlers:
            main:
                type: rotating_file
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]

            mailer:
                type: rotating_file
                path: "%kernel.logs_dir%/mailer.log"
                channels: mailer

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug

when@prod:
    monolog:
        channels:
            - mailer

        handlers:
            main:
                type: filter
                handler: main_stdout
                min_level: info
                max_level: warning
            main_stdout:
                type: stream
                path: php://stdout
                formatter: monolog.formatter.json
            errors_stderr:
                type: stream
                path: php://stderr
                level: error
                formatter: monolog.formatter.json
            mailer:
                type: rotating_file
                path: "%kernel.logs_dir%/mailer.log"
                channels: mailer
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]
            deprecation:
                type: stream
                channels: [deprecation]
                path: php://stderr
                formatter: monolog.formatter.json
