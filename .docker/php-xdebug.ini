; zend_extension est activé par le paquet php-zts-xdebug (15-xdebug.ini)
; trigger : session de debug uniquement sur demande (cookie XDEBUG_TRIGGER via
; l'extension navigateur, ou XDEBUG_TRIGGER=1 devant une commande CLI) —
; évite de ralentir chaque composer/bin/console maintenant que le CLI charge xdebug
xdebug.start_with_request = trigger
xdebug.cli_color=1
xdebug.show_local_vars=1
xdebug.use_compression=true