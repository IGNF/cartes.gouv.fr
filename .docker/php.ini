; .docker/php.ini — chargé comme 99-app.ini ; le stage prod ajoute
; 99-opcache-prod.ini qui doit trier APRÈS ce fichier (ordre alphabétique
; de conf.d) : ne pas renommer sans vérifier l'ordre
date.timezone = Europe/Paris
expose_php = off

apc.enable_cli = On
; cache.app utilise APCu en prod : prévoir ~64M de marge dans la limite mémoire
apc.shm_size = 64M

upload_max_filesize = 300M
post_max_size = 300M
memory_limit = 256M

realpath_cache_size = 4096k
realpath_cache_ttl = 7200

display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /proc/self/fd/2

[opcache]
opcache.enable = 1
opcache.enable_cli = 1
; 1 en dev (code bind-monté) ; le stage prod force 0 via 99-opcache-prod.ini
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
opcache.memory_consumption = 192
opcache.max_accelerated_files = 10000
opcache.max_wasted_percentage = 10
opcache.interned_strings_buffer = 16

; compression HTTP assurée par Caddy (encode zstd gzip), pas par PHP

variables_order = "EGPCS"
